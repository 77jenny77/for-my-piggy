<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="format-detection" content="telephone=no" />
<title>훈종아 눌러봐</title>
<style>
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0;
  min-height:100svh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:18vh;
  padding-left:24px;
  padding-right:24px;
  padding-bottom:env(safe-area-inset-bottom);
  font-family:-apple-system,BlinkMacSystemFont,
  "Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background-image:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url("01.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  transition:background-image .6s ease;
  overflow:hidden;
}
.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,
    rgba(255,77,109,.55),
    rgba(255,105,180,.45));
  opacity:0;
  pointer-events:none;
  transition:opacity .6s ease;
  z-index:5;
}
.overlay.show{ opacity:1; }
.particle{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  pointer-events:none;
  z-index:30;
  animation:explode 1s ease-out forwards;
}
@keyframes explode{
  to{ transform:translate(var(--x), var(--y)); opacity:0; }
}
.big-message{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:34px;
  font-weight:800;
  color:#fff;
  text-align:center;
  letter-spacing:1px;
  opacity:0;
  z-index:20;
  text-shadow:0 4px 20px rgba(0,0,0,.4);
  transition:opacity .4s ease;
  padding:24px;
  pointer-events:none;
}
.big-message.show{ opacity:1; }
.card{
  position:relative;
  z-index:10;
  width:100%;
  max-width:420px;
  padding:40px 28px;
  border-radius:32px;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  text-align:center;
  box-shadow:
    0 30px 70px rgba(0,0,0,.35),
    0 10px 40px rgba(255,77,109,.25);
}
h1{
  font-size:23px;
  line-height:1.6;
  margin:0 0 30px;
  font-weight:700;
  color:#ff4d6d;
}
.btn-container{
  position:relative;
  width:280px;
  height:80px;
  margin:0 auto;
  touch-action:manipulation;
  overflow:visible;
}
.btn{
  position:absolute;
  top:0;
  width:120px;
  height:56px;
  border:none;
  border-radius:30px;
  font-size:17px;
  cursor:pointer;
  transition:transform .2s ease;
  pointer-events:auto;
  z-index:100;
}
.btn:active{transform:scale(.9);}
.yes{
  left:0;
  background:linear-gradient(135deg,#ff4d6d,#ff8fab);
  color:#fff;
  font-weight:700;
  box-shadow:0 8px 24px rgba(255,77,109,.45);
}
.no{
  left:160px;
  background:#333;
  color:#fff;
  font-weight:600;
}
.result{
  margin-top:26px;
  font-size:22px;
  font-weight:700;
  color:#ff4d6d;
  display:none;
}
</style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="big-message" id="bigMessage"></div>
<div class="card">
  <h1>
    술많이 마셔서 미안😭<br>
    일요일에 고기먹으러 갈까?
  </h1>
  <div class="btn-container" id="btnArea">
    <button class="btn yes" id="yesBtn" type="button">Yes ❤️</button>
    <button class="btn no"  id="noBtn"  type="button">No</button>
  </div>
  <div class="result" id="result">❤️ 잡았다 ❤️</div>
</div>
<script>
(function(){
  const yesBtn  = document.getElementById("yesBtn");
  const noBtn   = document.getElementById("noBtn");
  const overlay = document.getElementById("overlay");
  const bigMsg  = document.getElementById("bigMessage");
  const result  = document.getElementById("result");

  yesBtn.addEventListener("click", () => {
    document.body.style.backgroundImage =
      'linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)), url("02.jpg")';
    overlay.classList.add("show");
    result.style.display = "block";
    bigMsg.textContent = "🎉 우리 데이트 확정 🎉";
    bigMsg.classList.add("show");
    launchFireworks();
  });

  function moveNo(){
    const w = noBtn.offsetWidth  || 120;
    const h = noBtn.offsetHeight || 56;
    noBtn.style.position = "fixed";
    noBtn.style.zIndex   = "200";
    noBtn.style.left = Math.max(0, Math.random() * (window.innerWidth  - w)) + "px";
    noBtn.style.top  = Math.max(0, Math.random() * (window.innerHeight - h)) + "px";
  }

  noBtn.addEventListener("mouseenter", moveNo);
  noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveNo(); }, { passive:false });
  noBtn.addEventListener("click",      (e) => { e.preventDefault(); moveNo(); });

  function launchFireworks(){
    const colors = ["#ff4d6d","#ff8fab","#ffb3c1","#ff006e","#fb5607","#ffbe0b","#8338ec","#3a86ff"];
    for(let burst = 0; burst < 6; burst++){
      setTimeout(() => {
        const cx = Math.random() * window.innerWidth;
        const cy = Math.random() * window.innerHeight * 0.6;
        for(let i = 0; i < 20; i++){
          const p = document.createElement("div");
          p.className = "particle";
          const angle = (i / 20) * 360;
          const dist  = 60 + Math.random() * 80;
          const rad   = angle * Math.PI / 180;
          p.style.left = cx + "px";
          p.style.top  = cy + "px";
          p.style.background = colors[Math.floor(Math.random() * colors.length)];
          p.style.setProperty("--x", (Math.cos(rad) * dist) + "px");
          p.style.setProperty("--y", (Math.sin(rad) * dist) + "px");
          document.body.appendChild(p);
          setTimeout(() => p.remove(), 1100);
        }
      }, burst * 250);
    }
  }
})();
</script>
</body>
</html>
