<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="format-detection" content="telephone=no" />
<title>자기야 눌러바바</title>
<style>
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0;
  min-height:100svh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:18vh;
  padding-left:24px;
  padding-right:24px;
  padding-bottom:env(safe-area-inset-bottom);
  font-family:-apple-system,BlinkMacSystemFont,
  "Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background-image:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url("01.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  transition:background-image .6s ease;
  overflow:hidden;
}
.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,
    rgba(255,77,109,.55),
    rgba(255,105,180,.45));
  opacity:0;
  pointer-events:none;
  transition:opacity .6s ease;
  z-index:5;
}
.overlay.show{ opacity:1; }
.particle{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  pointer-events:none;
  z-index:30;
  animation:explode 1s ease-out forwards;
}
@keyframes explode{
  to{ transform:translate(var(--x), var(--y)); opacity:0; }
}
.big-message{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:34px;
  font-weight:800;
  color:#fff;
  text-align:center;
  letter-spacing:1px;
  opacity:0;
  z-index:20;
  text-shadow:0 4px 20px rgba(0,0,0,.4);
  transition:opacity .4s ease;
  padding:24px;
  pointer-events:none;
}
.big-message.show{ opacity:1; }
.card{
  position:relative;
  z-index:10;
  width:100%;
  max-width:420px;
  padding:40px 28px;
  border-radius:32px;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  text-align:center;
  box-shadow:
    0 30px 70px rgba(0,0,0,.35),
    0 10px 40px rgba(255,77,109,.25);
}
h1{
  font-size:23px;
  line-height:1.6;
  margin:0 0 30px;
  font-weight:700;
  color:#ff4d6d;
}
.btn-container{
  position:relative;
  width:280px;
  height:80px;
  margin:0 auto;
  touch-action:manipulation;
  overflow:visible;
}
.btn{
  position:absolute;
  top:0;
  width:120px;
  height:56px;
  border:none;
  border-radius:30px;
  font-size:17px;
  cursor:pointer;
  transition:transform .2s ease;
  pointer-events:auto;
  z-index:100;
  touch-action:manipulation;   /* ✅ 모바일 더블탭 줌 방지 */
  user-select:none;            /* ✅ 텍스트 선택 방지 */
  -webkit-user-select:none;
}
.btn:active{transform:scale(.9);}
.yes{
  left:0;
  background:linear-gradient(135deg,#ff4d6d,#ff8fab);
  color:#fff;
  font-weight:700;
  box-shadow:0 8px 24px rgba(255,77,109,.45);
}
.no{
  left:160px;
  background:#333;
  color:#fff;
  font-weight:600;
}
.result{
  margin-top:26px;
  font-size:22px;
  font-weight:700;
  color:#ff4d6d;
  display:none;
}
</style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="big-message" id="bigMessage"></div>
<div class="card">
  <h1>
    술많이 마셔서 미안😭<br>
    일요일에 고기먹으러 가줄꺼지?
  </h1>
  <div class="btn-container" id="btnArea">
    <button class="btn yes" id="yesBtn" type="button">Yes(plz)</button>
    <button class="btn no"  id="noBtn"  type="button">No</button>
  </div>
  <div class="result" id="result">
    ❌🍷🍺🥃🍸❌<br>
    다시는 안취할겝...❤</div>
</div>
<script>
(function(){
  const yesBtn  = document.getElementById("yesBtn");
  const noBtn   = document.getElementById("noBtn");
  const overlay = document.getElementById("overlay");
  const bigMsg  = document.getElementById("bigMessage");
  const result  = document.getElementById("result");

  /* ── Yes ── */
  yesBtn.addEventListener("click", onYes);
  yesBtn.addEventListener("touchend", function(e){
    e.preventDefault();
    onYes();
  }, { passive:false });

  function onYes(){
    document.body.style.backgroundImage =
      'linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)), url("02.jpg")';
    overlay.classList.add("show");
    result.style.display = "block";
    bigMsg.textContent = "데이트 확정입니다💓🎉";
    bigMsg.classList.add("show");
    launchFireworks();
  }

  /* ── No 도망 ── */
  function moveNo(){
    const w = noBtn.offsetWidth  || 120;
    const h = noBtn.offsetHeight || 56;
    // 화면 안쪽 여백 10px 남겨서 도망
    const maxX = window.innerWidth  - w - 10;
    const maxY = window.innerHeight - h - 10;
    noBtn.style.position = "fixed";
    noBtn.style.zIndex   = "200";
    noBtn.style.left = Math.max(10, Math.random() * maxX) + "px";
    noBtn.style.top  = Math.max(10, Math.random() * maxY) + "px";
  }

  // PC: 마우스 올리면 도망
  noBtn.addEventListener("mouseenter", moveNo);

  // 모바일: 손가락 닿는 순간 도망 (touchstart)
  noBtn.addEventListener("touchstart", function(e){
    e.preventDefault(); // ✅ 클릭 이벤트 발생 차단
    moveNo();
  }, { passive:false });

  // 혹시 click까지 왔을 때도 도망
  noBtn.addEventListener("click", function(e){
    e.preventDefault();
    moveNo();
  });

})();

/* ── 폭죽 ── */
function launchFireworks(){
  const colors = ["#ff4d6d","#ff8fab","#ffb3c1","#ff006e","#fb5607","#ffbe0b","#8338ec","#3a86ff"];
  for(let burst = 0; burst < 6; burst++){
    setTimeout(() => {
      const cx = Math.random() * window.innerWidth;
      const cy = Math.random() * window.innerHeight * 0.6;
      for(let i = 0; i < 20; i++){
        const p = document.createElement("div");
        p.className = "particle";
        const angle = (i / 20) * 360;
        const dist  = 60 + Math.random() * 80;
        const rad   = angle * Math.PI / 180;
        p.style.left = cx + "px";
        p.style.top  = cy + "px";
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.setProperty("--x", (Math.cos(rad) * dist) + "px");
        p.style.setProperty("--y", (Math.sin(rad) * dist) + "px");
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1100);
      }
    }, burst * 250);
  }
}
</script>
</body>
</html>
